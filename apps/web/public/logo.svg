<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Dark background -->
  <rect width="100" height="100" rx="22" fill="#0D1117"/>

  <!-- Hanger hook arc (dome at top) -->
  <path d="M 40 26 A 10 10 0 0 1 60 26"
    stroke="#D4A853" stroke-width="4.5" stroke-linecap="round"/>

  <!-- Hook curl at very top -->
  <path d="M 60 26 A 6 6 0 0 0 50 16"
    stroke="#D4A853" stroke-width="4.5" stroke-linecap="round"/>

  <!-- Shoulder lines going outward -->
  <line x1="50" y1="36" x2="16" y2="78" stroke="#D4A853" stroke-width="4.5" stroke-linecap="round"/>
  <line x1="50" y1="36" x2="84" y2="78" stroke="#D4A853" stroke-width="4.5" stroke-linecap="round"/>

  <!-- Horizontal bar -->
  <line x1="16" y1="78" x2="84" y2="78" stroke="#D4A853" stroke-width="4.5" stroke-linecap="round"/>

  <!-- Check badge: dark bg circle + gold ring -->
  <circle cx="66" cy="60" r="14" fill="#0D1117"/>
  <circle cx="66" cy="60" r="14" stroke="#D4A853" stroke-width="3"/>

  <!-- Check mark inside badge -->
  <polyline points="59,60 63,65 73,54"
    stroke="#D4A853" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
